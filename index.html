<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Preconnect to external origins on the critical path -->
    <link rel="preconnect" href="https://api.github.com">
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>

    <!-- Primary SEO -->
    <title>Kobe Erauw – Software &amp; AI Developer</title>
    <meta name="description" content="Kobe Erauw is a Software &amp; AI student at Odisee Ghent, passionate about AI engineering, fullstack development, and building smart systems. Browse my projects.">
    <meta name="author" content="Kobe Erauw">
    <meta name="keywords" content="Kobe Erauw, software developer, AI engineer, fullstack developer, Odisee Ghent, portfolio, Vue, TypeScript">
    <link rel="canonical" href="https://kobeerauw.com/">

    <!-- Open Graph (Facebook, LinkedIn previews) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kobeerauw.com/">
    <meta property="og:title" content="Kobe Erauw – Software &amp; AI Developer">
    <meta property="og:description" content="Software &amp; AI student at Odisee Ghent. Explore my projects in AI engineering, fullstack development, and smart systems.">
    <meta property="og:site_name" content="Kobe Erauw Portfolio">
    <meta property="og:locale" content="en_GB">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Kobe Erauw – Software &amp; AI Developer">
    <meta name="twitter:description" content="Software &amp; AI student at Odisee Ghent. Explore my projects in AI engineering, fullstack development, and smart systems.">

    <!-- Structured Data: Person -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Kobe Erauw",
      "url": "https://kobeerauw.com",
      "jobTitle": "Software & AI Student",
      "description": "Software & AI student at Odisee Ghent, passionate about AI engineering, fullstack development and building smart systems.",
      "alumniOf": {
        "@type": "CollegeOrUniversity",
        "name": "Odisee",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Ghent",
          "addressCountry": "BE"
        }
      },
      "knowsAbout": ["Artificial Intelligence", "Fullstack Development", "Software Engineering", "TypeScript", "Vue.js"],
      "sameAs": [
        "https://github.com/kobe-erauw",
        "https://www.linkedin.com/in/kobe-erauw"
      ]
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Kobe Erauw Portfolio",
      "url": "https://kobeerauw.com",
      "description": "Portfolio website of Kobe Erauw - Software & AI developer from Ghent.",
      "author": {
        "@type": "Person",
        "name": "Kobe Erauw"
      }
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
